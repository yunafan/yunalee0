<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유나응원하기</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#f0f8ff;
    font-family:sans-serif;
}

.container{
    max-width:700px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:38px;
    font-weight:bold;
    color:#ff4f9a;
    margin-bottom:20px;
}

.poster{
    width:60%;
    display:block;
margin:auto;
    border-radius:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.text{
    margin-top:20px;
    background:#fff0f7;
    border:2px solid #ffb6d5;
    border-radius:18px;
    padding:25px;
    line-height:2;
    font-size:18px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.count{
    margin-top:20px;
    background:#fff0f7;
    border:2px solid #ffb6d5;
    border-radius:18px;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#ff4f9a;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.button-area{
    text-align:center;
    margin-top:15px;
}

button{
    border:none;
    background:#fff0f7;
    color:#ff4f9a;
    padding:12px 24px;
    font-size:16px;
    font-weight:bold;
    border-radius:12px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
</style>

</head>
<body>

<div class="container">

    <div class="title">
        유나응원하기
    </div>

    <img id="slideImage" class="poster" src="yuna1.jpg" alt="유나">

    <div class="text">
        유나,유나는 엄청 매우 많이 very 귀엽고 예쁘고 아름답다.
        유나는 보는 모든사람을 행복하게 해주는 능력을 지녔다.
        힘들때 유나를보면 한순간에 바로 행복해진다.
        유나는 단순 인플루언서가 아니라
        귀엽고 예쁘고 사람들을 행복하게해주는 그런 엄청난 존재이다.
    </div>

    <div class="count">
        ❤️ 좋아요 :
        <span id="faithCount">0</span>
    </div>

    <div class="button-area">
        <button id="supportBtn">
            유나 좋아하기 ❤️
        </button>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    doc,
    getDoc,
    updateDoc,
    increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyS5oGTKgefIvzhRw4K2Pke4fdq4zv6I0",
  authDomain: "yuna-is-god.firebaseapp.com",
  projectId: "yuna-is-god",
  storageBucket: "yuna-is-god.firebasestorage.app",
  messagingSenderId: "423130079028",
  appId: "1:423130079028:web:65d93683a8d1e81eab0f61"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const counterRef = doc(db, "stats", "counter");

async function loadCount() {

    try {

        const snap = await getDoc(counterRef);

        if (snap.exists()) {
            document.getElementById("faithCount").textContent =
                snap.data().faithCount || 0;
        }

    } catch (e) {

        console.error(e);

    }
}

async function support() {

    try {

        await updateDoc(counterRef, {
            faithCount: increment(1)
        });

        loadCount();

    } catch (e) {

        console.error(e);
        alert("오류 발생");

    }
}

document
    .getElementById("supportBtn")
    .addEventListener("click", support);

loadCount();

/* 사진 자동 넘김 */

const images = [
    "yuna1.jpg",
    "yuna2.jpg",
    "yuna3.jpg",
    "yuna4.jpg",
    "yuna5.jpg",
    "yuna6.png",
    "yuna7.jpg",
    "yuna8.jpg",
];

let currentImage = 0;

setInterval(() => {

    currentImage =
        (currentImage + 1) % images.length;

    document.getElementById("slideImage").src =
        images[currentImage];

}, 1500);

</script>

</body>
</html>
